<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E8E6E0;--border2:#D4D1C8;
  --text:#1A1916;--text2:#6B6860;--text3:#9E9C97;
  --blue:#1D6FE8;--blue-bg:#EBF2FD;--blue-light:#DDEAFB;
  --green:#1A7A4A;--green-bg:#E8F5EE;
  --amber:#956B00;--amber-bg:#FDF5E0;
  --red:#C0392B;--red-bg:#FDECEB;
  --radius:10px;--radius-lg:16px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:18px;height:18px;fill:white}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px}
.logo-tag{font-size:11px;color:var(--text3);margin-top:2px}

.nav{padding:14px 10px;flex:1;overflow-y:auto}
.nav-group{margin-bottom:18px}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:0 8px;margin-bottom:5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px;border:none;background:transparent;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.nav-icon{width:17px;height:17px;opacity:.65;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:2px 7px;min-width:20px;text-align:center;display:none}
.nav-badge.show{display:block}

.sidebar-user{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue);flex-shrink:0;border:2px solid var(--blue-light)}
.u-name{font-size:13px;font-weight:500;color:var(--text);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-role{font-size:11px;color:var(--text3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:58px;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.topbar-right{display:flex;gap:8px;align-items:center}

.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1860D0;border-color:#1860D0}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--bg)}

.content{flex:1;overflow-y:auto;padding:28px}
.page{display:none}
.page.active{display:block}

/* TOAST */
.toast{padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;margin-bottom:18px;display:none;border:1px solid}
.toast.show{display:flex;align-items:center;gap:8px}
.toast-ok{background:var(--green-bg);color:var(--green);border-color:#B8DFC9}
.toast-warn{background:var(--amber-bg);color:var(--amber);border-color:#E8D078}
.toast-err{background:var(--red-bg);color:var(--red);border-color:#F5C6C2}

/* LOADING */
.loading{display:none;align-items:center;gap:8px;font-size:13px;color:var(--text3);padding:24px 0}
.loading.show{display:flex}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px}
.metric-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:8px}
.metric-val{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1;font-family:'DM Mono',monospace}
.metric-sub{font-size:12px;color:var(--text3);margin-top:6px}
.metric-sub.up{color:var(--green)}
.metric-sub.warn{color:var(--amber)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 20px;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border);background:#FAFAF8}
.tbl td{padding:13px 20px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#FAFAF8}
.tbl .mono{font-family:'DM Mono',monospace;font-size:12px}
.tbl .muted{color:var(--text3)}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-dot{width:5px;height:5px;border-radius:50%}
.tag-pend{background:var(--amber-bg);color:var(--amber)}.tag-pend .tag-dot{background:var(--amber)}
.tag-aprov{background:var(--green-bg);color:var(--green)}.tag-aprov .tag-dot{background:var(--green)}
.tag-reprov{background:var(--red-bg);color:var(--red)}.tag-reprov .tag-dot{background:var(--red)}

/* FORM */
.form-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.form-section{padding:22px 24px 0}
.form-section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.span2{grid-column:1/-1}
.fg label{font-size:12px;font-weight:600;color:var(--text2)}
.fg input,.fg select,.fg textarea{font-family:'DM Sans',sans-serif;font-size:13px;border:1px solid var(--border2);border-radius:8px;padding:9px 12px;background:var(--surface);color:var(--text);outline:none;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,111,232,.1)}
.fg textarea{resize:vertical;min-height:82px}
.session-pill{font-size:12px;color:var(--text3);padding:9px 12px;background:var(--bg);border-radius:8px;border:1px dashed var(--border2)}
.session-pill strong{color:var(--text);font-weight:500}

.items-wrap{padding:0 24px 16px}
.items-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 10px}
.items-tbl{width:100%;border-collapse:collapse;font-size:13px}
.items-tbl th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border)}
.items-tbl td{padding:5px 5px}
.items-tbl td input{font-family:'DM Sans',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:7px;padding:7px 9px;width:100%;background:var(--surface);color:var(--text);outline:none}
.items-tbl td input:focus{border-color:var(--blue)}
.row-total{padding:0 10px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text3)}
.btn-rm{border:none;background:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:4px}
.total-bar{padding:12px 24px;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:flex-end;align-items:center;gap:12px}
.total-label{font-size:13px;color:var(--text2);font-weight:500}
.total-val{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.form-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* APROVAÇÃO */
.aprov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px;transition:opacity .3s}
.aprov-card.done{opacity:.45;pointer-events:none}
.aprov-top{padding:18px 20px 0;display:flex;align-items:flex-start;justify-content:space-between}
.aprov-id{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:3px}
.aprov-title{font-size:14px;font-weight:600}
.aprov-meta{display:flex;flex-wrap:wrap;gap:16px;padding:10px 20px;font-size:12px;color:var(--text2)}
.aprov-meta .valor{font-family:'DM Mono',monospace;font-weight:600;color:var(--text)}
.aprov-meta .prio{color:var(--text3)}
.aprov-just{margin:0 20px 14px;padding:11px 14px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--text2);line-height:1.65;border-left:3px solid var(--border2)}
.aprov-footer{padding:13px 20px;border-top:1px solid var(--border);display:flex;gap:8px}
.abtn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;border:1px solid}
.abtn-ok{background:var(--green-bg);color:var(--green);border-color:#B8DFC9}.abtn-ok:hover{background:#D4EFE0}
.abtn-no{background:var(--red-bg);color:var(--red);border-color:#F5C6C2}.abtn-no:hover{background:#FDDAD8}

/* FILTER */
.filter-row{display:flex;gap:10px;margin-bottom:16px}
.filter-row input,.filter-row select{font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);outline:none}
.filter-row input{flex:1}
.filter-row input:focus,.filter-row select:focus{border-color:var(--blue)}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px}

/* COMPROVANTE */
.comp-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.comprovante{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:44px 52px;max-width:820px;margin:0 auto;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.comp-h{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--text);padding-bottom:18px;margin-bottom:24px}
.comp-h-left .comp-h-title{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.comp-h-left .comp-h-sub{font-size:12px;color:var(--text2);margin-top:4px}
.comp-h-right{text-align:right}
.comp-h-right .comp-num{font-family:'DM Mono',monospace;font-size:18px;font-weight:600;letter-spacing:.5px}
.comp-h-right .comp-status{display:inline-flex;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:8px}
.comp-h-right .comp-status::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green)}

.comp-section{margin-bottom:22px}
.comp-section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.comp-section-val{font-size:14px;color:var(--text);font-weight:500;line-height:1.5}
.comp-grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:22px}
.comp-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;margin-bottom:22px}
.comp-just-box{background:var(--bg);border-left:3px solid var(--border2);padding:14px 16px;border-radius:6px;font-size:13px;color:var(--text2);line-height:1.7}
.comp-valor-box{background:var(--green-bg);border:1px solid #B8DFC9;border-radius:10px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;margin:24px 0}
.comp-valor-box .label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.1em}
.comp-valor-box .val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:var(--green);letter-spacing:-.5px}

.comp-aprov-box{border-top:1px solid var(--border);padding-top:22px;margin-top:8px}
.comp-aprov-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.comp-sign{margin-top:48px;display:grid;grid-template-columns:1fr 1fr;gap:60px}
.comp-sign-line{border-top:1px solid var(--text);padding-top:8px;text-align:center;font-size:11px;color:var(--text2)}
.comp-foot{margin-top:32px;padding-top:14px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);text-align:center;letter-spacing:.05em}

/* PRINT — esconde tudo menos o comprovante, formata pra A4 */
@media print {
  body{background:#fff !important}
  .sidebar,.topbar,.comp-actions,.comp-lista,#comp-lista{display:none !important}
  .shell,.main,.content,.page{display:block !important;overflow:visible !important;height:auto !important;padding:0 !important;margin:0 !important}
  .page{display:none !important}
  .page#page-comprovantes{display:block !important}
  .comprovante{border:none !important;box-shadow:none !important;padding:0 !important;max-width:100% !important;margin:0 !important;page-break-inside:avoid}
  @page{size:A4;margin:1.8cm 1.5cm}
}
</style>
