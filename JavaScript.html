<script>
// ══════════════════════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════════════════════
let todosReqs = [];
let currentUser = null;
let comprovanteAtivo = null; // ID da requisição sendo visualizada em detalhe
let contasMap = {}; // { 'codigo': {descricao, orcamento_mensal, departamento, ativo} }

// ══════════════════════════════════════════════════════════════
//  RPC — promisifica google.script.run
// ══════════════════════════════════════════════════════════════
function rpc(method, ...args) {
  return new Promise((resolve, reject) => {
    const runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(err => reject(err));
    runner[method].apply(runner, args);
  });
}

// ══════════════════════════════════════════════════════════════
//  NAVEGAÇÃO
// ══════════════════════════════════════════════════════════════
const PAGE_TITLES = {dashboard:'Dashboard',nova:'Nova requisição',aprovacao:'Aprovações',historico:'Histórico'};

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('page-title').textContent = PAGE_TITLES[id] || id;
  if (el) el.classList.add('active');
  if (id === 'historico') renderHist();
  if (id === 'aprovacao') renderAprov();
  if (id === 'nova') prefillForm();
  if (id === 'comprovantes') renderComprovantes();
}

function prefillForm() {
  if (!currentUser) return;
  const nameField = document.getElementById('f-nome');
  if (!nameField.value) nameField.value = currentUser.nome || '';
  document.getElementById('f-email-display').textContent = currentUser.email;
  const telField = document.getElementById('f-telefone');
  if (telField && !telField.value && currentUser.telefone) telField.value = currentUser.telefone;
  if (currentUser.departamento) {
    const dept = document.getElementById('f-dept');
    const opt = [...dept.options].find(o => o.value === currentUser.departamento || o.textContent === currentUser.departamento);
    if (opt) dept.value = opt.value;
  }
}

// Coleta os itens do formulário (descricao, qtd, valor_unit) — array
function coletarItens() {
  const itens = [];
  document.querySelectorAll('#items-body tr').forEach(row => {
    const inp = row.querySelectorAll('input');
    const descricao = (inp[0]?.value || '').trim();
    const qtd = parseFloat(inp[1]?.value) || 0;
    const valor_unit = parseFloat(inp[2]?.value) || 0;
    if (descricao || qtd > 0 || valor_unit > 0) {
      itens.push({ descricao, qtd, valor_unit });
    }
  });
  return itens;
}

// Parseia o campo "itens" (JSON na planilha) em array. Tolera campo vazio.
function parseItens(jsonStr) {
  if (!jsonStr) return [];
  try {
    const parsed = JSON.parse(jsonStr);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) { return []; }
}

// Estatísticas do solicitante: requisições no mês atual + valor total
function calcStatsSolicitante(emailSolicitante) {
  const e = (emailSolicitante || '').toLowerCase();
  const agora = new Date();
  const mes = agora.getMonth(), ano = agora.getFullYear();
  const doMes = todosReqs.filter(r => {
    if ((r.email||'').toLowerCase() !== e) return false;
    const d = parseDataLocal(r.data_criacao);
    return d && d.getMonth() === mes && d.getFullYear() === ano;
  });
  return {
    qtdMes: doMes.length,
    valorMes: doMes.reduce((s, r) => s + (parseFloat(r.valor_total) || 0), 0),
    qtdTotal: todosReqs.filter(r => (r.email||'').toLowerCase() === e).length
  };
}

// ══════════════════════════════════════════════════════════════
//  CARREGAR DADOS
// ══════════════════════════════════════════════════════════════
async function carregarTudo() {
  try {
    if (!currentUser) {
      currentUser = await rpc('getCurrentUser');
      atualizarUserUI();
    }
    // Carrega contas (orçamentos) — silencioso se a aba não existir
    try {
      const contas = await rpc('listarContas');
      contasMap = {};
      (Array.isArray(contas) ? contas : []).forEach(c => {
        if (c.conta) contasMap[String(c.conta).trim()] = c;
      });
    } catch (e) { contasMap = {}; }

    const reqs = await rpc('listarRequisicoes');
    todosReqs = Array.isArray(reqs) ? reqs : [];
    renderDash(todosReqs);
    atualizarBadge(todosReqs);
    if (document.getElementById('page-historico').classList.contains('active')) renderHist();
    if (document.getElementById('page-aprovacao').classList.contains('active')) renderAprov();
  } catch (e) {
    document.getElementById('dash-loading').classList.remove('show');
    document.getElementById('dash-table').style.display = 'block';
    document.getElementById('dash-tbody').innerHTML =
      '<tr><td colspan="6" style="text-align:center;color:var(--red);padding:32px">' +
      'Erro: ' + (e.message || e) + '</td></tr>';
  }
}

function atualizarUserUI() {
  const nome = currentUser.nome || currentUser.email;
  document.getElementById('user-avatar').textContent = nome[0].toUpperCase();
  document.getElementById('user-name').textContent = nome;

  const isAprovador = currentUser.papel === 'aprovador';
  const isGestor = currentUser.papel === 'gestor';
  const podeVerTudo = isAprovador || isGestor;

  // Rótulo do papel no rodapé da sidebar
  let role;
  if (isAprovador) role = 'Aprovador' + (currentUser.departamento ? ' · ' + currentUser.departamento : '');
  else if (isGestor) role = 'Gestor' + (currentUser.departamento ? ' · ' + currentUser.departamento : '');
  else role = currentUser.departamento || 'Solicitante';
  document.getElementById('user-role').textContent = role;

  // Controle de acesso por papel — esconde itens do menu
  // (filtro real dos dados é feito no servidor, em listarRequisicoes)
  const navDash = document.getElementById('nav-dashboard-btn');
  const navAprov = document.getElementById('nav-aprov-btn');

  if (!podeVerTudo) {
    // Solicitante: sem Dashboard nem Aprovações
    if (navDash) navDash.style.display = 'none';
    if (navAprov) navAprov.style.display = 'none';
    // Como o landing default é Dashboard, redireciona pra Nova requisição
    showPage('nova', document.getElementById('nav-nova-btn'));
  } else if (!isAprovador) {
    // Gestor: tem Dashboard, mas não Aprovações
    if (navAprov) navAprov.style.display = 'none';
  }
}

function renderDash(reqs) {
  document.getElementById('dash-loading').classList.remove('show');
  document.getElementById('dash-table').style.display = 'block';

  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const mes = new Date().getMonth();
  document.getElementById('m-mes').textContent = meses[mes];

  const doMes = reqs.filter(r => {
    const d = parseDataLocal(r.data_criacao);
    return d && d.getMonth() === mes;
  });
  const pend = reqs.filter(r => r.status === 'Pendente');
  const aprov = reqs.filter(r => r.status === 'Aprovada');
  const valorTotal = aprov.reduce((s, r) => s + (parseFloat(r.valor_total) || 0), 0);

  document.getElementById('m-total').textContent = doMes.length;
  document.getElementById('m-pend').textContent = pend.length;
  document.getElementById('m-aprov').textContent = aprov.length;
  document.getElementById('m-valor').textContent = 'R$' + (valorTotal / 1000).toFixed(0) + 'k';

  renderGastosPorConta(reqs);

  const tbody = document.getElementById('dash-tbody');
  const ultimas = [...reqs].reverse().slice(0, 8);
  if (!ultimas.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:24px">Nenhuma requisição ainda. Crie a primeira!</td></tr>';
    return;
  }
  tbody.innerHTML = ultimas.map(r => `
    <tr>
      <td class="mono muted">#${String(r.ID).padStart(3,'0')}</td>
      <td>${esc(r.titulo) || '—'}</td>
      <td>${esc(r.solicitante) || '—'}</td>
      <td class="mono">R$${parseFloat(r.valor_total||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      <td class="muted">${formatDate(r.data_criacao)}</td>
      <td>${tagFor(r.status)}</td>
    </tr>`).join('');
}

function renderGastosPorConta(reqs) {
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const agora = new Date();
  const mes = agora.getMonth(), ano = agora.getFullYear();
  document.getElementById('contas-mes').textContent = meses[mes] + '/' + ano;

  // Aprovadas do mês
  const aprovadasMes = reqs.filter(r => {
    if (r.status !== 'Aprovada') return false;
    const d = parseDataLocal(r.data_criacao);
    return d && d.getMonth() === mes && d.getFullYear() === ano;
  });

  // Agrupa gastos por conta
  const gastos = {};
  aprovadasMes.forEach(r => {
    const c = String(r.conta || '').trim() || 'Sem conta';
    if (!gastos[c]) gastos[c] = 0;
    gastos[c] += parseFloat(r.valor_total) || 0;
  });

  // Mescla: cada conta cadastrada vira uma linha (mesmo se ainda sem gasto),
  // e contas usadas mas não cadastradas também aparecem.
  const linhas = {};
  Object.entries(contasMap).forEach(([codigo, info]) => {
    linhas[codigo] = {
      conta: codigo,
      descricao: info.descricao || '',
      orcamento: parseFloat(info.orcamento_mensal) || 0,
      gasto: 0
    };
  });
  Object.entries(gastos).forEach(([codigo, valor]) => {
    if (!linhas[codigo]) {
      linhas[codigo] = { conta: codigo, descricao: '', orcamento: 0, gasto: 0 };
    }
    linhas[codigo].gasto = valor;
  });

  const card = document.getElementById('dash-contas');
  const tbody = document.getElementById('contas-tbody');
  card.style.display = 'block';

  // Ordena: alertas (% alto) primeiro, depois pelo gasto bruto
  const ordenadas = Object.values(linhas).sort((a, b) => {
    const pa = a.orcamento > 0 ? a.gasto / a.orcamento : -1;
    const pb = b.orcamento > 0 ? b.gasto / b.orcamento : -1;
    if (pa !== pb) return pb - pa;
    return b.gasto - a.gasto;
  });

  if (!ordenadas.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px">Nenhuma conta cadastrada nem gasto registrado em ' + meses[mes] + '.</td></tr>';
    return;
  }

  tbody.innerHTML = ordenadas.map(l => {
    const restante = l.orcamento - l.gasto;
    const pct = l.orcamento > 0 ? (l.gasto / l.orcamento * 100) : null;

    let pctCell, restanteCell;
    if (pct === null) {
      pctCell = '<span class="muted">sem orçamento</span>';
      restanteCell = '<span class="muted">—</span>';
    } else {
      let cor = 'color:var(--green)';
      let prefixo = '';
      if (pct >= 100) { cor = 'color:var(--red);font-weight:700'; prefixo = '⚠ '; }
      else if (pct >= 90) { cor = 'color:var(--red);font-weight:600'; prefixo = '⚠ '; }
      else if (pct >= 70) { cor = 'color:var(--amber);font-weight:600'; }
      pctCell = `<span style="${cor}">${prefixo}${pct.toFixed(1)}%</span>`;
      const corR = restante < 0 ? 'color:var(--red);font-weight:600' : '';
      restanteCell = `<span style="${corR}" class="mono">R$ ${restante.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>`;
    }

    return `
      <tr>
        <td class="mono">${esc(l.conta)}</td>
        <td>${esc(l.descricao) || '<span class="muted" style="font-style:italic">não cadastrada</span>'}</td>
        <td class="mono" style="text-align:right">${l.orcamento > 0 ? 'R$ ' + l.orcamento.toLocaleString('pt-BR',{minimumFractionDigits:2}) : '<span class="muted">—</span>'}</td>
        <td class="mono" style="text-align:right">R$ ${l.gasto.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
        <td style="text-align:right">${restanteCell}</td>
        <td style="text-align:right">${pctCell}</td>
      </tr>`;
  }).join('');
}

function atualizarBadge(reqs) {
  const pend = reqs.filter(r => r.status === 'Pendente').length;
  const badge = document.getElementById('nav-badge');
  badge.textContent = pend;
  if (pend > 0 && currentUser && currentUser.papel === 'aprovador') {
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// ══════════════════════════════════════════════════════════════
//  NOVA REQUISIÇÃO
// ══════════════════════════════════════════════════════════════
function calcTotal() {
  let grand = 0;
  document.querySelectorAll('#items-body tr').forEach(row => {
    const inp = row.querySelectorAll('input');
    const q = parseFloat(inp[1]?.value) || 0;
    const v = parseFloat(inp[2]?.value) || 0;
    const t = q * v;
    grand += t;
    const cell = row.querySelector('.row-total');
    if (cell) cell.textContent = t > 0 ? 'R$' + t.toLocaleString('pt-BR', {minimumFractionDigits:2}) : '—';
  });
  document.getElementById('grand-total').textContent = 'R$ ' + grand.toLocaleString('pt-BR', {minimumFractionDigits:2});
  return grand;
}

function novaLinhaItem() {
  return `
    <td><input type="text" placeholder="Descrição do item"/></td>
    <td><input type="number" value="1" min="1" style="width:64px" oninput="calcTotal()"/></td>
    <td><input type="number" placeholder="0,00" style="width:100px" oninput="calcTotal()"/></td>
    <td class="row-total">—</td>
    <td><button class="btn-rm" onclick="rmItem(this)">×</button></td>`;
}

function addItem() {
  const tr = document.createElement('tr');
  tr.innerHTML = novaLinhaItem();
  document.getElementById('items-body').appendChild(tr);
}

function rmItem(btn) {
  const rows = document.querySelectorAll('#items-body tr');
  if (rows.length > 1) { btn.closest('tr').remove(); calcTotal(); }
}

async function enviarReq() {
  const nome = document.getElementById('f-nome').value.trim();
  const titulo = document.getElementById('f-titulo').value.trim();
  const just = document.getElementById('f-just').value.trim();

  if (!nome || !titulo || !just) {
    mostrarToast('toast-nova-err', '⚠ Preencha nome, título e justificativa.');
    return;
  }

  const valor = calcTotal();
  const btn = document.getElementById('btn-enviar');
  btn.textContent = 'Enviando...';
  btn.disabled = true;

  try {
    const res = await rpc('criarRequisicao', {
      titulo,
      nome,
      departamento: document.getElementById('f-dept').value,
      prioridade: document.getElementById('f-prio').value,
      dataNecessaria: document.getElementById('f-data').value,
      justificativa: just,
      valor: valor,
      telefone: document.getElementById('f-telefone').value.trim(),
      conta: document.getElementById('f-cc').value.trim(),
      formaPagamento: document.getElementById('f-fpag').value,
      prazoPagamento: document.getElementById('f-ppag').value,
      itens: coletarItens()
    });
    mostrarToast('toast-nova', `✓ Requisição #${String(res.id).padStart(3,'0')} enviada! Aprovador notificado por e-mail.`);
    document.getElementById('f-titulo').value = '';
    document.getElementById('f-just').value = '';
    document.getElementById('items-body').innerHTML = `<tr>${novaLinhaItem()}</tr>`;
    calcTotal();
    todosReqs = await rpc('listarRequisicoes');
    renderDash(todosReqs);
    atualizarBadge(todosReqs);
  } catch (e) {
    mostrarToast('toast-nova-err', '✕ Erro: ' + (e.message || e));
  } finally {
    btn.textContent = 'Enviar para aprovação →';
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════════════════════════
//  APROVAÇÃO
// ══════════════════════════════════════════════════════════════
function renderAprov() {
  const list = document.getElementById('aprov-list');
  const empty = document.getElementById('aprov-empty');
  document.getElementById('aprov-loading').classList.remove('show');

  if (!currentUser || currentUser.papel !== 'aprovador') {
    list.innerHTML = '';
    empty.style.display = 'block';
    empty.innerHTML = '<div class="empty-icon">🔒</div><div class="empty-title">Acesso restrito</div><div class="empty-sub">Apenas aprovadores podem ver esta página.</div>';
    return;
  }

  const pendentes = todosReqs.filter(r => r.status === 'Pendente');
  if (!pendentes.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    empty.innerHTML = '<div class="empty-icon">✓</div><div class="empty-title">Nenhuma pendência!</div><div class="empty-sub">Todas as requisições foram analisadas.</div>';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = pendentes.map(r => {
    const itens = parseItens(r.itens);
    const stats = calcStatsSolicitante(r.email);
    const itensHtml = itens.length ? `
      <div class="aprov-block">
        <div class="aprov-block-label">Itens da compra</div>
        <table class="aprov-itens">
          <thead><tr><th>Descrição</th><th style="text-align:right">Qtd</th><th style="text-align:right">Valor unit.</th><th style="text-align:right">Total</th></tr></thead>
          <tbody>
            ${itens.map(it => {
              const total = (it.qtd||0) * (it.valor_unit||0);
              return `<tr>
                <td>${esc(it.descricao)||'—'}</td>
                <td style="text-align:right">${it.qtd||0}</td>
                <td style="text-align:right">R$ ${(it.valor_unit||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
                <td style="text-align:right" class="mono">R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>` : '';

    return `
    <div class="aprov-card" id="ac-${r.ID}">
      <div class="aprov-top">
        <div>
          <div class="aprov-id">#${String(r.ID).padStart(3,'0')} · ${formatDate(r.data_criacao)} · há ${diasAtras(r.data_criacao)} dia(s)</div>
          <div class="aprov-title">${esc(r.titulo) || '—'}</div>
        </div>
        ${tagFor(r.status)}
      </div>
      <div class="aprov-meta">
        <span>👤 ${esc(r.solicitante)}</span>
        <span>📧 ${esc(r.email||'')}</span>
        ${r.telefone ? `<span>📱 ${esc(r.telefone)}</span>` : ''}
        <span>🏢 ${esc(r.departamento)}</span>
        <span class="valor">R$ ${parseFloat(r.valor_total||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
        ${r.data_necessaria ? `<span>📅 Até ${formatDate(r.data_necessaria)}</span>` : ''}
        <span class="prio">Prio: ${esc(r.prioridade)}</span>
      </div>

      <div class="aprov-grid">
        ${r.conta ? `<div><div class="aprov-block-label">Conta</div><div class="aprov-block-val">${esc(r.conta)}</div></div>` : ''}
        ${r.forma_pagamento ? `<div><div class="aprov-block-label">Forma de pagamento</div><div class="aprov-block-val">${esc(r.forma_pagamento)}</div></div>` : ''}
        ${r.prazo_pagamento ? `<div><div class="aprov-block-label">Prazo</div><div class="aprov-block-val">${esc(r.prazo_pagamento)}</div></div>` : ''}
      </div>

      ${itensHtml}

      <div class="aprov-block">
        <div class="aprov-block-label">Justificativa</div>
        <div class="aprov-just">${esc(r.justificativa) || '—'}</div>
      </div>

      <div class="aprov-stats">
        <span class="stats-pill">📊 ${stats.qtdMes} requisição(ões) este mês</span>
        <span class="stats-pill">💰 R$ ${stats.valorMes.toLocaleString('pt-BR',{minimumFractionDigits:2})} no mês</span>
        <span class="stats-pill">📋 ${stats.qtdTotal} no total</span>
      </div>

      <div class="aprov-footer">
        <button class="abtn abtn-ok" onclick="aprovar(${r.ID},'Aprovada')">✓ Aprovar</button>
        <button class="abtn abtn-no" onclick="aprovar(${r.ID},'Reprovada')">✕ Reprovar</button>
      </div>
    </div>`;
  }).join('');
}

function diasAtras(dataStr) {
  const d = parseDataLocal(dataStr);
  if (!d) return '?';
  const ms = Date.now() - d.getTime();
  return Math.max(0, Math.floor(ms / (1000 * 60 * 60 * 24)));
}

// Parseia "yyyy-MM-dd" como data local (não UTC) — evita o desvio de 1 dia
function parseDataLocal(str) {
  if (!str) return null;
  if (typeof str === 'string') {
    const m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  }
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

async function aprovar(id, status) {
  const card = document.getElementById('ac-' + id);
  if (card) card.classList.add('done');
  try {
    await rpc('atualizarStatus', id, status, '');
    const req = todosReqs.find(r => r.ID == id);
    if (req) req.status = status;
    mostrarToast('toast-aprov', `✓ Requisição #${String(id).padStart(3,'0')} ${status.toLowerCase()} com sucesso.`);
    atualizarBadge(todosReqs);
    setTimeout(renderAprov, 800);
  } catch (e) {
    if (card) card.classList.remove('done');
    mostrarToast('toast-aprov-err', '✕ Erro: ' + (e.message || e));
  }
}

// ══════════════════════════════════════════════════════════════
//  COMPROVANTES (requisições aprovadas — visualizar/imprimir)
// ══════════════════════════════════════════════════════════════
function renderComprovantes() {
  // alterna entre lista e detalhe
  if (comprovanteAtivo !== null) {
    document.getElementById('comp-lista').style.display = 'none';
    document.getElementById('comp-detalhe').style.display = 'block';
    renderComprovanteDetalhe();
  } else {
    document.getElementById('comp-lista').style.display = 'block';
    document.getElementById('comp-detalhe').style.display = 'none';
    renderComprovantesLista();
  }
}

function renderComprovantesLista() {
  const q = (document.getElementById('comp-srch').value || '').toLowerCase();
  const aprovadas = todosReqs.filter(r =>
    r.status === 'Aprovada' &&
    (!q || (r.titulo||'').toLowerCase().includes(q) || String(r.ID).includes(q) || (r.solicitante||'').toLowerCase().includes(q))
  );
  const tbody = document.getElementById('comp-tbody');
  if (!aprovadas.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:32px">Nenhuma requisição aprovada ainda.</td></tr>';
    return;
  }
  tbody.innerHTML = [...aprovadas].reverse().map(r => `
    <tr>
      <td class="mono muted">#${String(r.ID).padStart(3,'0')}</td>
      <td>${esc(r.titulo)||'—'}</td>
      <td>${esc(r.solicitante)||'—'}</td>
      <td>${esc(r.departamento)||'—'}</td>
      <td class="mono">R$${parseFloat(r.valor_total||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      <td class="muted">${formatDate(r.data_criacao)}</td>
      <td><button class="btn btn-sm" onclick="abrirComprovante(${r.ID})">Ver</button></td>
    </tr>`).join('');
}

function renderHist() {
  document.getElementById('hist-loading').classList.remove('show');
  document.getElementById('hist-card').style.display = 'block';
  filtrarHist();
}

function filtrarHist() {
  const q = document.getElementById('srch').value.toLowerCase();
  const fs = document.getElementById('fstatus').value;
  const fd = document.getElementById('fdept').value;
  const filtrado = todosReqs.filter(r =>
    (!q || (r.titulo||'').toLowerCase().includes(q) || String(r.ID).includes(q) || (r.solicitante||'').toLowerCase().includes(q)) &&
    (!fs || r.status === fs) &&
    (!fd || r.departamento === fd)
  );
  const tbody = document.getElementById('hist-tbody');
  if (!filtrado.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px">Nenhum resultado encontrado.</td></tr>';
    return;
  }
  tbody.innerHTML = [...filtrado].reverse().map(r => `
    <tr>
      <td class="mono muted">#${String(r.ID).padStart(3,'0')}</td>
      <td>${esc(r.titulo)||'—'}</td>
      <td>${esc(r.solicitante)||'—'}</td>
      <td>${esc(r.departamento)||'—'}</td>
      <td class="mono">R$${parseFloat(r.valor_total||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      <td class="muted">${formatDate(r.data_criacao)}</td>
      <td>${tagFor(r.status)}</td>
    </tr>`).join('');
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function tagFor(s) {
  const m = {Aprovada:'aprov',Pendente:'pend',Reprovada:'reprov'};
  const c = m[s] || 'pend';
  return `<span class="tag tag-${c}"><span class="tag-dot"></span>${esc(s)||'—'}</span>`;
}

function formatDate(str) {
  if (!str) return '—';
  // Strings no formato yyyy-MM-dd vêm do servidor já no fuso correto.
  // Se passarmos por new Date(), ele interpreta como UTC e desloca um dia
  // no horário de Brasília. Formatamos a string direto.
  if (typeof str === 'string') {
    const m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return `${m[3]}/${m[2]}/${m[1]}`;
  }
  try { return new Date(str).toLocaleDateString('pt-BR'); } catch(e) { return str; }
}

function mostrarToast(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

// Escapa HTML pra evitar XSS quando exibimos dados da planilha
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
